<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>MU — Micron Technology Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --accent:    #2f81f7;
      --accent2:   #3fb950;
      --red:       #f85149;
      --muted:     #8b949e;
      --text:      #e6edf3;
      --text-dim:  #c9d1d9;
      --radius:    10px;
      --gap:       16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .badge {
      background: rgba(47,129,247,.15);
      color: var(--accent);
      border: 1px solid rgba(47,129,247,.3);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 600;
    }
    .last-updated {
      margin-left: auto;
      color: var(--muted);
      font-size: 12px;
    }
    #refresh-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    #refresh-btn:hover { opacity: .85; }
    #refresh-btn.loading { opacity: .5; pointer-events: none; }

    /* ── Layout ── */
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      gap: var(--gap);
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-areas:
        "hero  hero  hero"
        "chart chart ratings"
        "news  news  financials";
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .card-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── Hero ── */
    .hero { grid-area: hero; display: flex; flex-wrap: wrap; gap: 24px; align-items: center; }
    .price-block { display: flex; align-items: baseline; gap: 12px; }
    .price { font-size: 48px; font-weight: 700; letter-spacing: -2px; }
    .price-change { font-size: 18px; font-weight: 600; }
    .price-change.up   { color: var(--accent2); }
    .price-change.down { color: var(--red); }
    .price-label { color: var(--muted); font-size: 13px; }

    .metrics-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-left: auto;
    }
    .metric {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      min-width: 110px;
    }
    .metric-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
    .metric-value { font-size: 16px; font-weight: 600; margin-top: 2px; }

    /* ── Chart ── */
    .chart-area { grid-area: chart; }
    .chart-toolbar {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }
    .range-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
    }
    .range-btn.active, .range-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .chart-wrap { position: relative; height: 260px; }

    /* ── Ratings ── */
    .ratings-area { grid-area: ratings; }
    .consensus-badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 14px;
    }
    .consensus-badge.buy    { background: rgba(63,185,80,.15); color: var(--accent2); border: 1px solid rgba(63,185,80,.3); }
    .consensus-badge.hold   { background: rgba(210,153,34,.15); color: #d4a017; border: 1px solid rgba(210,153,34,.3); }
    .consensus-badge.sell   { background: rgba(248,81,73,.15); color: var(--red); border: 1px solid rgba(248,81,73,.3); }

    .rating-bar-wrap { margin-bottom: 10px; }
    .rating-bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    .rating-bar-track {
      height: 8px;
      background: var(--bg);
      border-radius: 4px;
      overflow: hidden;
    }
    .rating-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width .6s ease;
    }
    .bar-strong-buy  { background: #2ea043; }
    .bar-buy         { background: #3fb950; }
    .bar-hold        { background: #d4a017; }
    .bar-sell        { background: #f0883e; }
    .bar-strong-sell { background: #f85149; }

    .pt-block {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .pt-label { color: var(--muted); font-size: 12px; }
    .pt-value { font-size: 22px; font-weight: 700; }
    .pt-upside { font-size: 12px; color: var(--accent2); font-weight: 600; }

    /* ── News ── */
    .news-area { grid-area: news; }
    .news-list { display: flex; flex-direction: column; gap: 12px; }
    .news-item {
      display: flex;
      gap: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .news-item:last-child { border-bottom: none; padding-bottom: 0; }
    .news-source {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--accent);
      white-space: nowrap;
      min-width: 80px;
      padding-top: 2px;
    }
    .news-body { flex: 1; }
    .news-headline {
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      font-size: 13px;
      line-height: 1.4;
      display: block;
    }
    .news-headline:hover { color: var(--accent); }
    .news-meta { color: var(--muted); font-size: 11px; margin-top: 3px; }
    .news-sentiment {
      font-size: 10px;
      font-weight: 700;
      border-radius: 4px;
      padding: 2px 6px;
      align-self: flex-start;
      white-space: nowrap;
    }
    .sent-pos { background: rgba(63,185,80,.15); color: var(--accent2); }
    .sent-neu { background: rgba(139,148,158,.15); color: var(--muted); }
    .sent-neg { background: rgba(248,81,73,.15); color: var(--red); }

    /* ── Financials ── */
    .financials-area { grid-area: financials; }
    .fin-table { width: 100%; border-collapse: collapse; }
    .fin-table tr { border-bottom: 1px solid var(--border); }
    .fin-table tr:last-child { border-bottom: none; }
    .fin-table td { padding: 9px 4px; font-size: 13px; }
    .fin-table td:first-child { color: var(--muted); }
    .fin-table td:last-child { text-align: right; font-weight: 600; }
    .fin-divider td {
      padding-top: 14px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--accent);
      border-bottom: none;
    }

    /* ── Skeleton loading ── */
    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, #3d444d 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
      display: inline-block;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      main {
        grid-template-columns: 1fr 1fr;
        grid-template-areas:
          "hero hero"
          "chart chart"
          "ratings financials"
          "news news";
      }
    }
    @media (max-width: 580px) {
      main {
        grid-template-columns: 1fr;
        grid-template-areas: "hero" "chart" "ratings" "financials" "news";
      }
      .price { font-size: 36px; }
      .metrics-row { margin-left: 0; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">micron<span>.</span>dash</div>
  <span class="badge">NASDAQ: MU</span>
  <span class="last-updated" id="last-updated">Loading…</span>
  <button id="refresh-btn" onclick="loadAll()">↻ Refresh</button>
</header>

<main>

  <!-- ── Hero ── -->
  <div class="card hero" id="hero-card">
    <div>
      <div class="price-label">MICRON TECHNOLOGY, INC.</div>
      <div class="price-block">
        <span class="price" id="price">—</span>
        <span class="price-change" id="price-change">—</span>
      </div>
      <div class="price-label" id="price-range">52-wk range loading…</div>
    </div>
    <div class="metrics-row" id="metrics-row">
      <!-- injected by JS -->
    </div>
  </div>

  <!-- ── Price Chart ── -->
  <div class="card chart-area">
    <div class="card-title">Price History</div>
    <div class="chart-toolbar" id="chart-toolbar">
      <button class="range-btn" data-range="1M">1M</button>
      <button class="range-btn active" data-range="3M">3M</button>
      <button class="range-btn" data-range="6M">6M</button>
      <button class="range-btn" data-range="1Y">1Y</button>
    </div>
    <div class="chart-wrap">
      <canvas id="priceChart"></canvas>
    </div>
  </div>

  <!-- ── Analyst Ratings ── -->
  <div class="card ratings-area">
    <div class="card-title">Analyst Ratings</div>
    <span class="consensus-badge buy" id="consensus-badge">Strong Buy</span>
    <div id="rating-bars"><!-- injected by JS --></div>
    <div class="pt-block">
      <div>
        <div class="pt-label">Avg. Price Target</div>
        <div class="pt-value" id="pt-value">—</div>
      </div>
      <div style="text-align:right">
        <div class="pt-label">Upside / Downside</div>
        <div class="pt-upside" id="pt-upside">—</div>
      </div>
    </div>
  </div>

  <!-- ── News ── -->
  <div class="card news-area">
    <div class="card-title">Latest News</div>
    <div class="news-list" id="news-list"><!-- injected by JS --></div>
  </div>

  <!-- ── Key Financials ── -->
  <div class="card financials-area">
    <div class="card-title">Key Financials</div>
    <table class="fin-table" id="fin-table"><!-- injected by JS --></table>
  </div>

</main>

<script>
console.log("%c[dashboard v2] loaded — Yahoo Finance proxy active, NO Finnhub candles", "color:#2f81f7;font-weight:bold");
// ─────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────
const CONFIG = {
  symbol: "MU",
};

// ─────────────────────────────────────────────
//  SHARED METRICS CACHE
//  Both fetchQuote() and fetchFinancials() need
//  the same /stock/metric call — fetch once.
// ─────────────────────────────────────────────
let _metricsPromise = null;
function getMetrics() {
  if (!_metricsPromise) {
    _metricsPromise = fetch(
      `/api/finnhub?path=stock/metric&symbol=${CONFIG.symbol}&metric=all`
    )
      .then(r => r.json())
      .finally(() => setTimeout(() => { _metricsPromise = null; }, 5 * 60_000));
  }
  return _metricsPromise;
}

// ─────────────────────────────────────────────
//  FORMAT HELPERS
// ─────────────────────────────────────────────
function fmtLargeNum(n) {
  if (n == null || isNaN(n)) return "N/A";
  if (n >= 1e12) return "$" + (n / 1e12).toFixed(2) + "T";
  if (n >= 1e9)  return "$" + (n / 1e9).toFixed(2) + "B";
  if (n >= 1e6)  return "$" + (n / 1e6).toFixed(2) + "M";
  return "$" + n.toLocaleString();
}

function fmtVol(millionsPerDay) {
  // Finnhub returns avg daily volume already in millions
  if (millionsPerDay == null || isNaN(millionsPerDay)) return "N/A";
  const n = millionsPerDay * 1e6;
  if (n >= 1e9) return (n / 1e9).toFixed(2) + "B";
  if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
  return n.toLocaleString();
}

function relativeTime(unixSec) {
  const diff = Math.floor(Date.now() / 1000) - unixSec;
  if (diff < 3600)  return Math.floor(diff / 60) + "m ago";
  if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
  return Math.floor(diff / 86400) + "d ago";
}

function inferSentiment(headline) {
  const h = headline.toLowerCase();
  const pos = /beat|surges?|jumps?|rises?|gains?|record|strong|upgrades?|rally|bullish|higher|boost|soars?|exceeds?/;
  const neg = /miss(es)?|falls?|drops?|declin|warning|downgrades?|bearish|loss|\bcut\b|concern|risk|slump|weak|below|disappoint/;
  if (pos.test(h)) return "pos";
  if (neg.test(h)) return "neg";
  return "neu";
}

// ─────────────────────────────────────────────
//  CHART
// ─────────────────────────────────────────────
let priceChart = null;

function initChart(dates, prices) {
  const ctx = document.getElementById("priceChart").getContext("2d");

  const gradient = ctx.createLinearGradient(0, 0, 0, 260);
  gradient.addColorStop(0, "rgba(47,129,247,0.25)");
  gradient.addColorStop(1, "rgba(47,129,247,0.00)");

  if (priceChart) priceChart.destroy();

  priceChart = new Chart(ctx, {
    type: "line",
    data: {
      labels: dates,
      datasets: [{
        data: prices,
        borderColor: "#2f81f7",
        borderWidth: 2,
        pointRadius: 0,
        fill: true,
        backgroundColor: gradient,
        tension: 0.35,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "#1c2128",
          borderColor: "#30363d",
          borderWidth: 1,
          titleColor: "#8b949e",
          bodyColor: "#e6edf3",
          bodyFont: { weight: "bold", size: 14 },
          callbacks: {
            label: ctx => " $" + ctx.parsed.y.toFixed(2),
          },
        },
      },
      scales: {
        x: {
          grid: { color: "rgba(48,54,61,0.5)" },
          ticks: { color: "#8b949e", maxTicksLimit: 8, maxRotation: 0 },
          border: { color: "#30363d" },
        },
        y: {
          position: "right",
          grid: { color: "rgba(48,54,61,0.5)" },
          ticks: { color: "#8b949e", callback: v => "$" + v },
          border: { color: "#30363d" },
        },
      },
    },
  });
}

// Chart range buttons — re-fetch live candles on click
document.getElementById("chart-toolbar").addEventListener("click", async e => {
  const btn = e.target.closest(".range-btn");
  if (!btn) return;
  document.querySelectorAll(".range-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  try {
    const { prices, dates } = await fetchPriceHistory(btn.dataset.range);
    initChart(dates, prices);
  } catch (err) {
    console.error("Chart range error:", err);
  }
});

// ─────────────────────────────────────────────
//  RENDER HELPERS
// ─────────────────────────────────────────────
function safeFixed(v, digits = 2, fallback = "N/A") {
  return (v != null && isFinite(v)) ? Number(v).toFixed(digits) : fallback;
}

function renderHero(d) {
  document.getElementById("price").textContent = "$" + safeFixed(d.price);

  const change    = d.change    ?? 0;
  const changePct = d.changePct ?? 0;
  const sign = change >= 0 ? "+" : "";
  const el = document.getElementById("price-change");
  el.textContent = `${sign}${safeFixed(change)}  (${sign}${safeFixed(changePct)}%)`;
  el.className = "price-change " + (change >= 0 ? "up" : "down");

  document.getElementById("price-range").textContent =
    `52-wk: $${d.week52Low} – $${d.week52High}  ·  Open $${safeFixed(d.open)}  ·  Prev Close $${safeFixed(d.prevClose)}`;

  const metrics = [
    { label: "Volume",    value: d.volume },
    { label: "Avg Vol",   value: d.avgVolume },
    { label: "Mkt Cap",   value: d.marketCap },
    { label: "P/E Ratio", value: d.peRatio },
    { label: "EPS (TTM)", value: d.eps },   // eps already includes "$" from fetchQuote
  ];
  document.getElementById("metrics-row").innerHTML = metrics.map(m => `
    <div class="metric">
      <div class="metric-label">${m.label}</div>
      <div class="metric-value">${m.value}</div>
    </div>`).join("");
}

function renderRatings(r, currentPrice, pt) {
  const total = r.strongBuy + r.buy + r.hold + r.sell + r.strongSell;
  const bars = [
    { label: "Strong Buy",  count: r.strongBuy,  cls: "bar-strong-buy" },
    { label: "Buy",         count: r.buy,         cls: "bar-buy" },
    { label: "Hold",        count: r.hold,        cls: "bar-hold" },
    { label: "Sell",        count: r.sell,        cls: "bar-sell" },
    { label: "Strong Sell", count: r.strongSell,  cls: "bar-strong-sell" },
  ];

  document.getElementById("rating-bars").innerHTML = bars.map(b => `
    <div class="rating-bar-wrap">
      <div class="rating-bar-label"><span>${b.label}</span><span>${b.count}</span></div>
      <div class="rating-bar-track">
        <div class="rating-bar-fill ${b.cls}" style="width:${total ? (b.count/total*100).toFixed(1) : 0}%"></div>
      </div>
    </div>`).join("");

  // Consensus
  const score = (r.strongBuy * 5 + r.buy * 4 + r.hold * 3 + r.sell * 2 + r.strongSell * 1) / (total || 1);
  const badge = document.getElementById("consensus-badge");
  if (score >= 4.5)      { badge.textContent = "Strong Buy";  badge.className = "consensus-badge buy"; }
  else if (score >= 3.5) { badge.textContent = "Buy";         badge.className = "consensus-badge buy"; }
  else if (score >= 2.5) { badge.textContent = "Hold";        badge.className = "consensus-badge hold"; }
  else                   { badge.textContent = "Sell";        badge.className = "consensus-badge sell"; }

  const ptBlock = document.querySelector(".pt-block");
  if (pt && pt > 0 && currentPrice > 0) {
    ptBlock.style.display = "";
    document.getElementById("pt-value").textContent = "$" + pt.toFixed(2);
    const upside = ((pt - currentPrice) / currentPrice * 100).toFixed(1);
    const ptUpEl = document.getElementById("pt-upside");
    ptUpEl.textContent = (upside >= 0 ? "+" : "") + upside + "% upside";
    ptUpEl.style.color = upside >= 0 ? "var(--accent2)" : "var(--red)";
  } else {
    ptBlock.style.display = "none";
  }
}

function renderNews(items) {
  const sentLabel = { pos: "Positive", neu: "Neutral", neg: "Negative" };
  const sentCls   = { pos: "sent-pos", neu: "sent-neu", neg: "sent-neg" };
  document.getElementById("news-list").innerHTML = items.length
    ? items.map(n => `
        <div class="news-item">
          <div class="news-source">${n.source}</div>
          <div class="news-body">
            <a class="news-headline" href="${n.url}" target="_blank" rel="noopener">${n.headline}</a>
            <div class="news-meta">${n.time}</div>
          </div>
          <span class="news-sentiment ${sentCls[n.sentiment]}">${sentLabel[n.sentiment]}</span>
        </div>`).join("")
    : `<div style="color:var(--muted);padding:12px 0">No recent news found.</div>`;
}

function renderFinancials(fin) {
  const sections = [
    { label: "Valuation",    data: fin.valuation },
    { label: "Performance",  data: fin.performance },
    { label: "Balance Sheet", data: fin.balance },
  ];
  document.getElementById("fin-table").innerHTML = sections.map(s => `
    <tr class="fin-divider"><td colspan="2">${s.label}</td></tr>
    ${Object.entries(s.data).map(([k, v]) => `
      <tr><td>${k}</td><td>${v}</td></tr>`).join("")}
  `).join("");
}

// ─────────────────────────────────────────────
//  LIVE API FUNCTIONS
// ─────────────────────────────────────────────

async function apiFetch(label, url) {
  console.log(`[API] ${label} →`, url);
  const res = await fetch(url);
  if (!res.ok) throw new Error(`${label} HTTP ${res.status}`);
  const json = await res.json();
  console.log(`[API] ${label} ←`, json);
  return json;
}

async function fetchQuote() {
  const { symbol: sym } = CONFIG;
  const [q, metrics] = await Promise.all([
    apiFetch("quote",   `/api/finnhub?path=quote&symbol=${sym}`),
    apiFetch("metrics", `/api/finnhub?path=stock/metric&symbol=${sym}&metric=all`),
  ]);

  // Cache metrics so fetchFinancials() reuses the same response
  if (!_metricsPromise) _metricsPromise = Promise.resolve(metrics);

  const m = metrics.metric || {};

  // Prefer peTTM when peNormalizedAnnual is absent (common on free tier)
  const pe  = m.peNormalizedAnnual ?? m.peTTM;
  const eps = m.epsNormalizedAnnual ?? m.epsTTM;

  return {
    price:      q.c,
    change:     q.d,
    changePct:  q.dp,
    open:       q.o,
    prevClose:  q.pc,
    volume:     fmtVol(m["10DayAverageTradingVolume"]),
    avgVolume:  fmtVol(m["3MonthAverageTradingVolume"]),
    marketCap:  m.marketCapitalization != null ? fmtLargeNum(m.marketCapitalization * 1e6) : "N/A",
    peRatio:    pe  != null ? pe.toFixed(1)  + "×" : "N/A",
    eps:        eps != null ? "$" + eps.toFixed(2)  : "N/A",
    week52High: m["52WeekHigh"] != null ? m["52WeekHigh"].toFixed(2) : "N/A",
    week52Low:  m["52WeekLow"]  != null ? m["52WeekLow"].toFixed(2)  : "N/A",
  };
}

async function fetchPriceHistory(range = "3M") {
  // Routed through local server proxy to avoid CORS on Yahoo Finance
  const rangeMap = { "1M": "1mo", "3M": "3mo", "6M": "6mo", "1Y": "1y" };
  const yRange   = rangeMap[range] || "3mo";
  const data     = await apiFetch(
    `yahoo-chart-${range}`,
    `/api/yahoo-chart?symbol=${CONFIG.symbol}&range=${yRange}&interval=1d`
  );
  const result = data?.chart?.result?.[0];
  if (!result) throw new Error("Yahoo Finance returned no chart result");

  const timestamps = result.timestamp;
  const closes     = result.indicators.quote[0].close;

  const prices = [];
  const dates  = [];
  for (let i = 0; i < timestamps.length; i++) {
    if (closes[i] == null) continue;          // skip missing bars
    prices.push(+closes[i].toFixed(2));
    dates.push(new Date(timestamps[i] * 1000)
      .toLocaleDateString("en-US", { month: "short", day: "numeric" }));
  }
  console.log(`[chart] ${range}: ${prices.length} data points, latest $${prices.at(-1)}`);
  return { prices, dates };
}

async function fetchRatings() {
  const { symbol: sym } = CONFIG;
  // stock/price-target requires a paid plan — only fetch recommendations (free)
  const recs = await apiFetch(
    "recommendations",
    `/api/finnhub?path=stock/recommendation&symbol=${sym}`
  );
  const rec = Array.isArray(recs) && recs.length ? recs[0] : {};
  console.log("[ratings] using period:", rec.period);
  return {
    ratings: {
      strongBuy:  rec.strongBuy  ?? 0,
      buy:        rec.buy        ?? 0,
      hold:       rec.hold       ?? 0,
      sell:       rec.sell       ?? 0,
      strongSell: rec.strongSell ?? 0,
    },
    priceTarget: null,   // no free endpoint available; hidden in UI
  };
}

async function fetchNews() {
  const { symbol: sym } = CONFIG;
  const toDate   = new Date();
  const fromDate = new Date();
  fromDate.setDate(fromDate.getDate() - 7);
  const fmt = d => d.toISOString().split("T")[0];
  const url = `/api/finnhub?path=company-news&symbol=${sym}&from=${fmt(fromDate)}&to=${fmt(toDate)}`;
  const items = await apiFetch("news", url);
  if (!Array.isArray(items)) {
    console.warn("[news] unexpected response:", items);
    return [];
  }
  console.log(`[news] ${items.length} items returned`);
  return items.slice(0, 8).map(n => ({
    source:    n.source   || "News",
    headline:  n.headline || "(no headline)",
    time:      relativeTime(n.datetime),
    url:       n.url      || "#",
    sentiment: inferSentiment(n.headline || ""),
  }));
}

async function fetchFinancials() {
  const metrics = await getMetrics();
  const m = metrics.metric || {};
  console.log("[financials] metric keys with values:",
    Object.entries(m).filter(([,v]) => v != null).map(([k]) => k));
  const na   = v => v != null && !isNaN(v);
  const pct  = v => na(v) ? v.toFixed(1) + "%" : "N/A";
  const mult = v => na(v) ? v.toFixed(1) + "×" : "N/A";
  const dol  = v => na(v) ? "$" + v.toFixed(2)  : "N/A";
  const pe   = m.peNormalizedAnnual ?? m.peTTM;
  return {
    valuation: {
      "Market Cap":  na(m.marketCapitalization) ? fmtLargeNum(m.marketCapitalization * 1e6) : "N/A",
      "P/E (TTM)":   mult(pe),
      "P/S (TTM)":   mult(m.psTTM),
      "P/B":         mult(m.pbQuarterly),
      "Beta":        na(m.beta) ? m.beta.toFixed(2) : "N/A",
    },
    performance: {
      "Gross Margin":    pct(m.grossMarginTTM),
      "Net Margin":      pct(m.netMarginTTM),
      "ROE (TTM)":       pct(m.roeTTM),
      "Revenue Gr. YoY": pct(m.revenueGrowthTTMYoy),
      "EPS (Annual)":    dol(m.epsNormalizedAnnual ?? m.epsTTM),
    },
    balance: {
      "Current Ratio": na(m.currentRatioAnnual)             ? m.currentRatioAnnual.toFixed(2)             : "N/A",
      "Debt / Equity": na(m["totalDebt/totalEquityAnnual"]) ? m["totalDebt/totalEquityAnnual"].toFixed(2) : "N/A",
      "Div. Yield":    na(m.dividendYieldIndicatedAnnual)   ? m.dividendYieldIndicatedAnnual.toFixed(2) + "%" : "N/A",
      "52-wk Return":  pct(m["52WeekPriceReturnDaily"]),
    },
  };
}

// ─────────────────────────────────────────────
//  LOAD ALL — orchestrates everything
// ─────────────────────────────────────────────
async function loadAll() {
  const btn = document.getElementById("refresh-btn");
  btn.classList.add("loading");
  btn.textContent = "↻ Loading…";
  _metricsPromise = null; // force fresh fetch on every manual refresh

  try {
    // Run all fetches concurrently; use allSettled so one failure doesn't abort the rest
    const [quoteR, histR, ratingsR, newsR, finR] = await Promise.allSettled([
      fetchQuote(),
      fetchPriceHistory("3M"),
      fetchRatings(),
      fetchNews(),
      fetchFinancials(),
    ]);

    if (quoteR.status === "fulfilled") {
      renderHero(quoteR.value);
    } else {
      console.error("[quote] FAILED:", quoteR.reason);
      document.getElementById("price").textContent = "Error";
    }

    if (histR.status === "fulfilled") {
      initChart(histR.value.dates, histR.value.prices);
    } else {
      console.error("[history] FAILED:", histR.reason);
    }

    if (ratingsR.status === "fulfilled") {
      const price = quoteR.value?.price ?? 0;
      renderRatings(ratingsR.value.ratings, price, ratingsR.value.priceTarget);
    } else {
      console.error("[ratings] FAILED:", ratingsR.reason);
    }

    if (newsR.status === "fulfilled") {
      renderNews(newsR.value);
    } else {
      console.error("[news] FAILED:", newsR.reason);
      renderNews([]);
    }

    if (finR.status === "fulfilled") {
      renderFinancials(finR.value);
    } else {
      console.error("[financials] FAILED:", finR.reason);
    }

    const errors = [quoteR, histR, ratingsR, newsR, finR].filter(r => r.status === "rejected").length;
    document.getElementById("last-updated").textContent = errors
      ? `Updated ${new Date().toLocaleTimeString()} (${errors} section${errors > 1 ? "s" : ""} failed — see console)`
      : "Updated " + new Date().toLocaleTimeString();

    document.querySelectorAll(".range-btn").forEach(b =>
      b.classList.toggle("active", b.dataset.range === "3M"));
  } catch (err) {
    console.error("Dashboard load error:", err);
    document.getElementById("last-updated").textContent = "Error loading data — see console";
  } finally {
    btn.classList.remove("loading");
    btn.textContent = "↻ Refresh";
  }
}

// Init
loadAll();
</script>
